<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Number Guessing Game</title>
  <style>
    body{font-family: Arial, sans-serif;background:#f7fafc;color:#122;display:flex;align-items:center;justify-content:center;height:100vh;margin:0}
    .app{background:#fff;padding:20px;border-radius:8px;box-shadow:0 6px 18px rgba(10,20,40,0.08);width:320px;text-align:center}
    input{padding:8px;width:60px;margin-right:8px}
    button{padding:8px 12px}
    .log{margin-top:12px;height:60px;overflow:auto;text-align:left;font-size:0.95rem}
    a{color:#0b5fff;text-decoration:none;font-weight:600}
  </style>
  </head>
<body>
  <div class="app">
    <h2>Guess the Number</h2>
    <p>I'm thinking of a number between 1 and 100.</p>
    <div>
      <input id="guess" type="number" min="1" max="100" />
      <button id="tryBtn">Guess</button>
      <button id="newBtn">New Game</button>
    </div>
    <div class="log" id="log"></div>
    <p style="margin-top:12px;font-size:0.95rem;color:#444">Return to: <a href="index.html">Resume</a> • <a href="scratch.html">Sketching</a></p>
  </div>

  <script>
    (function(){
      let target, attempts;
      const guessEl = document.getElementById('guess');
      const log = document.getElementById('log');
      const tryBtn = document.getElementById('tryBtn');
      const newBtn = document.getElementById('newBtn');

      function start(){
        target = Math.floor(Math.random()*100)+1;
        attempts = 0;
        log.innerHTML = '<div>New game started. Good luck!</div>';
      }

      function say(msg){
        const d = document.createElement('div'); d.textContent = msg; log.appendChild(d); log.scrollTop = log.scrollHeight;
      }

      tryBtn.addEventListener('click',()=>{
        const val = Number(guessEl.value);
        if(!val || val<1 || val>100) { say('Enter a number 1–100'); return }
        attempts++;
        if(val === target) { say('🎉 Correct! Attempts: ' + attempts); }
        else if(val < target) say('Too low — try higher');
        else say('Too high — try lower');
      });

      newBtn.addEventListener('click', start);
      start();
    })();
  </script>
</body>
</html>
